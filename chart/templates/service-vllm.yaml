{{- if .Values.vllm.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ml-serving-platform.fullname" . }}-vllm
  labels:
    {{- include "ml-serving-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  type: ClusterIP
  selector:
    {{- include "ml-serving-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
  ports:
    - name: http
      port: {{ .Values.vllm.port }}
      targetPort: http
      protocol: TCP
{{- end }}
