{{- if .Values.llmWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ml-serving-platform.fullname" . }}-llm-worker
  labels:
    {{- include "ml-serving-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-worker
spec:
  replicas: {{ .Values.llmWorker.replicas }}
  selector:
    matchLabels:
      {{- include "ml-serving-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: llm-worker
  template:
    metadata:
      labels:
        {{- include "ml-serving-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: llm-worker
    spec:
      containers:
        - name: llm-worker
          image: "{{ include "ml-serving-platform.image" (list . .Values.llmWorker.image) }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.llmWorker.port }}
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: APP_ENV
              value: {{ .Values.llmWorker.env.APP_ENV | quote }}
            - name: VLLM_BASE_URL
              value: "http://{{ include "ml-serving-platform.fullname" . }}-vllm:{{ .Values.vllm.port }}"
            - name: VLLM_DEFAULT_MODEL
              value: {{ .Values.llmWorker.env.VLLM_DEFAULT_MODEL | quote }}
          resources:
            {{- toYaml .Values.llmWorker.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
