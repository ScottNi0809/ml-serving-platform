{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ml-serving-platform.fullname" . }}
  labels:
    {{- include "ml-serving-platform.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- if .Values.ingress.exposeRegistry }}
          - path: /api/v1/models
            pathType: Prefix
            backend:
              service:
                name: {{ include "ml-serving-platform.fullname" . }}-registry
                port:
                  number: {{ .Values.registry.port }}
          {{- end }}
          - path: /api/v1/gateway
            pathType: Prefix
            backend:
              service:
                name: {{ include "ml-serving-platform.fullname" . }}-gateway
                port:
                  number: {{ .Values.gateway.port }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "ml-serving-platform.fullname" . }}-gateway
                port:
                  number: {{ .Values.gateway.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ml-serving-platform.fullname" . }}-gateway
                port:
                  number: {{ .Values.gateway.port }}
{{- end }}
