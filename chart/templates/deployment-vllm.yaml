{{- if .Values.vllm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ml-serving-platform.fullname" . }}-vllm
  labels:
    {{- include "ml-serving-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  replicas: {{ .Values.vllm.replicas }}
  selector:
    matchLabels:
      {{- include "ml-serving-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vllm
  template:
    metadata:
      labels:
        {{- include "ml-serving-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vllm
    spec:
      containers:
        - name: vllm
          image: "{{ include "ml-serving-platform.image" (list . .Values.vllm.image) }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.vllm.port }}
              protocol: TCP
          env:
            - name: MODEL_NAME
              value: {{ .Values.vllm.env.MODEL_NAME | quote }}
            - name: MAX_MODEL_LEN
              value: {{ .Values.vllm.env.MAX_MODEL_LEN | quote }}
            - name: GPU_MEMORY_UTILIZATION
              value: {{ .Values.vllm.env.GPU_MEMORY_UTILIZATION | quote }}
            - name: HF_HOME
              value: {{ .Values.vllm.env.HF_HOME | quote }}
            - name: HF_ENDPOINT
              value: {{ .Values.vllm.env.HF_ENDPOINT | quote }}
          resources:
            requests:
              {{- toYaml .Values.vllm.resources.requests | nindent 14 }}
            limits:
              {{- toYaml .Values.vllm.resources.limits | nindent 14 }}
              {{- if .Values.vllm.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.vllm.gpu.count }}
              {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          {{- if .Values.vllm.modelCache.enabled }}
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.vllm.env.HF_HOME | quote }}
          {{- end }}
      {{- if .Values.vllm.modelCache.enabled }}
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ include "ml-serving-platform.fullname" . }}-vllm-model-cache
      {{- end }}
{{- end }}
