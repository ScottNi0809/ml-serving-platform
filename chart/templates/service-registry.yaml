apiVersion: v1
kind: Service
metadata:
  name: {{ include "ml-serving-platform.fullname" . }}-registry
  labels:
    {{- include "ml-serving-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry
spec:
  type: ClusterIP
  selector:
    {{- include "ml-serving-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: registry
  ports:
    - name: http
      port: {{ .Values.registry.port }}
      targetPort: http
      protocol: TCP
