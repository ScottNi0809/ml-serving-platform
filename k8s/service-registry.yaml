# service-registry.yaml
# 为 registry Deployment 的 Pod 提供稳定的网络入口
apiVersion: v1
kind: Service
metadata:
  name: registry                # ★ Service 名 = 集群内 DNS 名
  labels:
    app: registry
spec:
  type: ClusterIP               # 集群内部访问（默认类型）
  selector:
    app: registry               # ★ 匹配 Deployment 中 Pod 的标签
  ports:
    - port: 8000                # Service 暴露的端口
      targetPort: 8000          # 转发到 Pod 的端口
      protocol: TCP
      name: http