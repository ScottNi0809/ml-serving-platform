# configmap-registry.yaml
# 集中管理 registry 服务的配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-config              # ConfigMap 名称，Deployment 会引用这个名字
  labels:
    app: registry
data:                                 # ★ 所有配置项都写在 data 下面
  APP_ENV: "production"
  DATABASE_URL: "sqlite:///./data/registry.db"
  MODEL_STORE_PATH: "./model_store"
  LOG_LEVEL: "info"